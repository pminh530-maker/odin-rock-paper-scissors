<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log("Hello World");
        let humanScore = 0;
        let computerScore = 0;

        // These variables must be declared at the start so they become global and can be accessed by functions later on.

        function getComputerChoice () {
            let computerChoice = Math.floor(Math.random()*3);
            console.log(computerChoice)
            if (computerChoice === 0) return "rock";
            if (computerChoice === 1) return "paper";
            return "scissors"
            }

        function getHumanChoice () {
            let humanChoice = prompt("Choose your symbol!", "");
            return  humanChoice.toLowerCase();
        }

        function playGame() {
            function playRound(humanSelection,computerSelection) {
            if (humanSelection === computerSelection) {
                return console.log("It's a tie!");
            } else if (humanSelection === "rock" && computerSelection === "paper") {
                return console.log("You lose! Paper beats Rock", `Computer ${++computerScore}, You ${humanScore}`);
            } else if (humanSelection === "rock" && computerSelection === "scissors") {
                return console.log("You win! Rock beats Scissors", `Computer ${computerScore}, You ${++humanScore}`);
            } else if (humanSelection === "paper" && computerSelection === "scissors") {
                return console.log("You lose! Scissors beats Paper", `Computer ${++computerScore}, You ${humanScore}`);
            } else if (humanSelection === "paper" && computerSelection === "rock") {
                return console.log("You win! Paper beats Rock", `Computer ${computerScore}, You ${++humanScore}`);
            } else if (humanSelection === "scissors" && computerSelection === "rock") {
                return console.log("You lose! Rock beats Scissors", `Computer ${++computerScore}, You ${humanScore}`);
            } else if (humanSelection === "scissors" && computerSelection === "paper") {
                return console.log("You win! Scissors beats Paper", `Computer ${computerScore}, You ${++humanScore}`);
            }
            }

            // The loop needs to be inside the fucntion
            for (let i = 0; i < 5; i++) {
                console.log(`--- Round ${i + 1} ---`); 
                // It has to be i+1, otherwise if we use the prefix ++i, the game starts at Round 0
                const humanSelection = getHumanChoice();    // RECALLING the choice
                const computerSelection = getComputerChoice(); // RECALLING the choice
                
                playRound(humanSelection, computerSelection); // Executing the round
            }

            // 3. (Optional) Show final score here after the loop finishes
            console.log(`Final Score -> You: ${humanScore} | Computer: ${computerScore}`);
            if (humanScore > computerScore) {
                console.log("CONGRATULATIONS! You won the match!");
            } else if (computerScore > humanScore) {
                console.log("GAME OVER: The computer won the match.");
            } else {
                console.log("IT'S A DRAW!");
            }
        }
        
        playGame();

    </script>
</body>
</html>
