<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li></li>
    </ul>
    <script>
        let list = document.querySelector("ul");
        list.style.listStyleType = "none";

        let choice = document.querySelector("li");
        
        let rock = document.createElement("button");
        rock.textContent = "ROCK";
        rock.addEventListener("click", (e) => playRound("rock", getComputerChoice()));
        choice.appendChild(rock);

        let paper = document.createElement("button");
        paper.textContent = "PAPER";
        paper.addEventListener("click", (e) => playRound("paper", getComputerChoice()));
        choice.appendChild(paper);

        let scissors = document.createElement("button");
        scissors.textContent = "SCISSORS";
        scissors.addEventListener("click", (e) => playRound("scissors", getComputerChoice()));
        choice.appendChild(scissors);

        let humanScore = 0;
        let computerScore = 0;

        function getComputerChoice () {
            let computerChoice = Math.floor(Math.random()*3);
            console.log(computerChoice)
            if (computerChoice === 0) return "rock";
            if (computerChoice === 1) return "paper";
            return "scissors"
            }

        function playRound(humanSelection,computerSelection) {
            let result = document.createElement("div");
            list.appendChild(result)

            if (humanScore === 5 || computerScore === 5) {return};

            if (humanSelection === computerSelection) {
                result.textContent = "It's a tie!"; 
            } else if (humanSelection === "rock" && computerSelection === "paper") {
                result.textContent = `You lose! Paper beats Rock, Computer ${++computerScore}, You ${humanScore}`;
            } else if (humanSelection === "rock" && computerSelection === "scissors") {
                result.textContent = `You win! Rock beats Scissors Computer ${computerScore}, You ${++humanScore}`;
            } else if (humanSelection === "paper" && computerSelection === "scissors") {
                result.textContent = `You lose! Scissors beats Paper Computer ${++computerScore}, You ${humanScore}`;
            } else if (humanSelection === "paper" && computerSelection === "rock") {
                result.textContent = `You win! Paper beats Rock Computer ${computerScore}, You ${++humanScore}`;
            } else if (humanSelection === "scissors" && computerSelection === "rock") {
                result.textContent = `You lose! Rock beats Scissors Computer ${++computerScore}, You ${humanScore}`;
            } else if (humanSelection === "scissors" && computerSelection === "paper") {
                result.textContent = `You win! Scissors beats Paper" Computer ${computerScore}, You ${++humanScore}`;
            }

            if (humanScore == 5) {
                result.textContent = `The human wins! Computer ${computerScore}, You ${humanScore}`};  
            if (computerScore == 5) {
                result.textContent = `The computer wins! Computer ${computerScore}, You ${humanScore}`
            };

            }   
    </script>
</body>
</html>
